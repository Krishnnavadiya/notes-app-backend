services:
  - type: web
    name: notes-app-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: DATABASE_URL
        fromDatabase:
          name: notes-app-db
          property: connectionString
      - key: OWNER_NAME
        sync: false
      - key: OWNER_EMAIL
        sync: false

databases:
  - name: notes-app-db
    plan: free
    databaseName: notes
    user: notes
